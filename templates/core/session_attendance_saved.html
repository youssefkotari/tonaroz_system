{% extends 'core/base.html' %}
{% block title %}Présence enregistrée — Centre Tonaroz{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top:60px;">
  <div class="col-lg-5">
    <div class="card text-center" style="border-color:#a7f3d0;">
      <div class="card-body py-5">
        <div class="mb-4">
          <div class="stat-card-icon mx-auto" style="width:64px;height:64px;font-size:30px;background:#d1fae5;">
            <i class="bi bi-check-circle-fill" style="color:#10b981;"></i>
          </div>
        </div>
        <h4 class="fw-700 mb-2">Présence enregistrée !</h4>
        <p class="text-muted">
          La présence pour <strong>{{ session.group.name }}</strong> du {{ session.date|date:"d/m/Y" }} a été sauvegardée.
        </p>
        <div class="mt-4">
          <a href="{% url 'core:sessions_today' %}" class="btn btn-primary">
            <i class="bi bi-arrow-left"></i> Retour aux sessions du jour
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
<style>.fw-700 { font-weight: 700; }</style>
{% endblock %}

{% extends 'core/base.html' %}
{% block title %}Exception enregistrée — Centre Tonaroz{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top:60px;">
  <div class="col-lg-5">
    <div class="card text-center" style="border-color:#a7f3d0;">
      <div class="card-body py-5">
        <div class="mb-4">
          <div class="stat-card-icon mx-auto" style="width:64px;height:64px;font-size:30px;background:#d1fae5;">
            <i class="bi bi-check-circle-fill" style="color:#10b981;"></i>
          </div>
        </div>
        <h4 class="fw-700 mb-2">Exception enregistrée !</h4>
        <p class="text-muted mb-4">La modification de session a été sauvegardée avec succès.</p>
        <div class="d-flex gap-2 justify-content-center">
          <a href="{% url 'core:session_exceptions_list' %}" class="btn btn-outline-secondary">
            <i class="bi bi-list-ul"></i> Voir les exceptions
          </a>
          <a href="{% url 'core:sessions_schedule' %}" class="btn btn-primary">
            <i class="bi bi-calendar3"></i> Planning
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
<style>.fw-700 { font-weight: 700; }</style>
{% endblock %}

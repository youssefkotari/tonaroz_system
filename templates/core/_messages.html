{% if messages %}
  <div class="mb-4" role="alert" aria-live="polite">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-start gap-2" role="alert">
        <i class="bi bi-{% if message.tags == 'success' %}check-circle-fill{% elif message.tags == 'error' or message.tags == 'danger' %}exclamation-circle-fill{% elif message.tags == 'warning' %}exclamation-triangle-fill{% else %}info-circle-fill{% endif %} mt-1 flex-shrink-0"></i>
        <div class="flex-grow-1">{{ message }}</div>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  </div>
{% endif %}
